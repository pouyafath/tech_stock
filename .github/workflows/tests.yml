name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-cov
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q --cov=src --cov-report=term-missing --cov-fail-under=55
      - name: Demo smoke test (bundled samples, no network)
        # Validates sample data, view models, and markdown rendering with no
        # network/Claude spend. Fails the build if the demo path breaks — the
        # previous `... | grep ... || true` could never fail and also launched
        # a blocking Streamlit server.
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "import sys; from src.preflight import run_demo_smoke_test; r = run_demo_smoke_test(); print(r); sys.exit(0 if r.get('ok') else 1)"

  lint-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff syntax/undefined-name check
        run: ruff check .
      - name: Ruff format check (whole src/ and tests/)
        # Previously only checked 4 hand-picked files; CI passed even when
        # 30+ modules drifted out of format. Expanded after a one-time
        # `ruff format src/ tests/` baseline so the signal is honest.
        run: ruff format --check src/ tests/ ui/ tools/
      - name: Dependency vulnerability audit
        run: pip-audit --requirement requirements.txt

  pyinstaller-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependency
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Validate PyInstaller is available
        run: pyinstaller --version
      - name: Validate package-smoke source checks
        run: python tools/package_smoke.py --platform source --dist .

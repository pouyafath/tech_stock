name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-cov
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q --cov=src --cov-report=term-missing --cov-fail-under=55
      - name: Demo smoke test
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m src.main --demo --non-interactive 2>&1 | grep -E "demo|report|complete|error" || true

  lint-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff syntax/undefined-name check
        run: ruff check .
      - name: Ruff format check (whole src/ and tests/)
        # Previously only checked 4 hand-picked files; CI passed even when
        # 30+ modules drifted out of format. Expanded after a one-time
        # `ruff format src/ tests/` baseline so the signal is honest.
        run: ruff format --check src/ tests/ ui/ tools/
      - name: Dependency vulnerability audit
        run: pip-audit --requirement requirements.txt

  pyinstaller-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependency
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Validate PyInstaller is available
        run: pyinstaller --version

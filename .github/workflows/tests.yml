name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q

  lint-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff syntax/undefined-name check
        run: ruff check .
      - name: Ruff format check for new shared modules
        run: ruff format --check src/view_models.py src/report_pipeline.py tests/test_view_models.py tests/test_report_pipeline.py
      - name: Dependency vulnerability audit
        run: pip-audit --requirement requirements.txt

  pyinstaller-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependency
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Validate PyInstaller is available
        run: pyinstaller --version
